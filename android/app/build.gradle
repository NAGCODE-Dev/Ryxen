apply plugin: 'com.android.application'

def envOrProperty = { String key ->
    def envValue = System.getenv(key)
    if (envValue != null && envValue.toString().trim()) return envValue.toString().trim()
    def propertyValue = project.findProperty(key)
    return propertyValue != null && propertyValue.toString().trim() ? propertyValue.toString().trim() : null
}

def releaseStoreFilePath = envOrProperty('RYXEN_ANDROID_KEYSTORE_PATH')
def releaseStorePassword = envOrProperty('RYXEN_ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = envOrProperty('RYXEN_ANDROID_KEY_ALIAS')
def releaseKeyPassword = envOrProperty('RYXEN_ANDROID_KEY_PASSWORD')
def appLinkPrimaryHost = envOrProperty('RYXEN_APP_LINK_HOST') ?: 'ryxen-app.vercel.app'
def appLinkLegacyHost = envOrProperty('RYXEN_LEGACY_APP_LINK_HOST') ?: 'cross-app-six.vercel.app'
def hasReleaseSigning = [
    releaseStoreFilePath,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
].every { it }

android {
    namespace "com.nagcode.ryxen"
    compileSdk rootProject.ext.compileSdkVersion
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                enableV1Signing true
                enableV2Signing true
            }
        }
    }
    defaultConfig {
        applicationId "com.nagcode.ryxen"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        manifestPlaceholders = [
            ryxenAppLinkHost: appLinkPrimaryHost,
            ryxenLegacyAppLinkHost: appLinkLegacyHost,
        ]
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

if (!hasReleaseSigning) {
    logger.lifecycle('Release signing not configured. Set RYXEN_ANDROID_KEYSTORE_PATH, RYXEN_ANDROID_KEYSTORE_PASSWORD, RYXEN_ANDROID_KEY_ALIAS and RYXEN_ANDROID_KEY_PASSWORD to generate a signed release/AAB.')
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

android {
    // Override the generated Capacitor block so local builds stay on Java 17.
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
