services:
  - type: web
    # Preserve the legacy Render service name to avoid breaking existing deploy wiring during the Ryxen transition.
    name: crossapp-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8787
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN_ALIASES
        value: https://ryxen-app.vercel.app,https://cross-app-six.vercel.app,https://ryxen-nagcode-devs-projects.vercel.app,https://ryxen-git-main-nagcode-devs-projects.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPPORT_EMAIL
        value: nagcode.contact@gmail.com
      - key: ADMIN_EMAILS
        value: nagcode.contact@gmail.com
      - key: DEV_EMAILS
        value: nagcode.contact@gmail.com
      - key: EXPOSE_RESET_CODE
        value: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: nagcode.contact@gmail.com
      - key: KIWIFY_WEBHOOK_TOKEN
        sync: false
      - key: KIWIFY_ACCOUNT_ID
        sync: false
      - key: KIWIFY_CLIENT_ID
        sync: false
      - key: KIWIFY_CLIENT_SECRET
        sync: false
      - key: KIWIFY_PRODUCT_ATHLETE_PLUS_ID
        sync: false
      - key: KIWIFY_PRODUCT_STARTER_ID
        sync: false
      - key: KIWIFY_PRODUCT_PRO_ID
        sync: false
      - key: KIWIFY_PRODUCT_PERFORMANCE_ID
        sync: false
