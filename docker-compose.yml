services:
  db:
    image: postgres:16
    # Container and database identifiers stay on the legacy name to avoid breaking existing local volumes and URLs.
    container_name: crossapp-postgres
    environment:
      POSTGRES_USER: crossapp
      POSTGRES_PASSWORD: crossapp
      POSTGRES_DB: crossapp
    ports:
      - "${CROSSAPP_DB_PORT:-5432}:5432"
    volumes:
      - crossapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossapp -d crossapp"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    image: node:20-alpine
    # Container identifiers stay on the legacy name to avoid breaking existing local scripts and compose expectations.
    container_name: crossapp-backend
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "[ -d node_modules ] || npm install; npm run start"
    environment:
      PORT: 8787
      DATABASE_URL: postgres://crossapp:crossapp@db:5432/crossapp
      JWT_SECRET: ${JWT_SECRET:-crossapp-local-dev-secret}
      FRONTEND_ORIGIN: http://localhost:8000
      SUPPORT_EMAIL: nagcode.contact@gmail.com
      ADMIN_EMAILS: nagcode.contact@gmail.com
      DEV_EMAILS: nagcode.contact@gmail.com
      EXPOSE_RESET_CODE: ${EXPOSE_RESET_CODE:-true}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: nagcode.contact@gmail.com
    ports:
      - "${CROSSAPP_BACKEND_PORT:-8787}:8787"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    container_name: crossapp-mailpit
    ports:
      - "${CROSSAPP_MAILPIT_PORT:-8025}:8025"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: crossapp-frontend
    ports:
      - "${CROSSAPP_FRONTEND_PORT:-8000}:8000"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

volumes:
  crossapp_pgdata:
