<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ryxen Coach</title>
  <meta name="theme-color" content="#071427">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      font-family: "Manrope", system-ui, sans-serif;
      background: #10141a;
      color: #f3f6fb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(168, 194, 247, 0.18), transparent 40%),
        linear-gradient(180deg, #10141a 0%, #0d1117 100%);
      padding: 24px;
    }
    main {
      width: min(520px, 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012)),
        rgba(22, 28, 36, 0.92);
      border: 1px solid rgba(196, 210, 233, 0.14);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 28px 82px rgba(4, 8, 16, 0.3);
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: rgba(225, 231, 241, 0.72);
    }
    a {
      color: #d7e5ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Coach Portal</h1>
    <p id="coach-build-status">Preparando o build local do portal...</p>
    <p>Se esta tela não redirecionar sozinha, rode <code>npm run build</code> e abra novamente <code>/coach/</code>.</p>
  </main>
  <script type="module">
    const statusEl = document.getElementById('coach-build-status');
    const buildUrl = new URL('../dist/coach/index.html', window.location.href);
    buildUrl.search = window.location.search;
    buildUrl.hash = window.location.hash;

    try {
      const response = await fetch(buildUrl, { method: 'HEAD', cache: 'no-store' });
      if (response.ok) {
        window.location.replace(buildUrl.toString());
      } else if (statusEl) {
        statusEl.textContent = 'Build do portal não encontrado ainda.';
      }
    } catch {
      if (statusEl) {
        statusEl.textContent = 'Não foi possível localizar o build local do portal.';
      }
    }
  </script>
</body>
</html>
